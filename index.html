<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Globes - Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        /* 💻 PERFECT DESKTOP VIEW */
        .background-container {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('globe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            position: relative;
        }
        /* Desktop text placement precisely aligned under the globe */
        .content {
            position: absolute;
            top: 84%;   
            left: 46.5%; 
            transform: translate(-50%, -50%);
            color: #ffffff;
            padding: 10px;
            width: 85%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 6px 0;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }
        p {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 400;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
            opacity: 0.95;
        }
        
        /* 📱 MOBILE FIX: Full-page background with smart focus shifting */
        @media (max-width: 768px) {
            .background-container {
                background-size: cover; /* Forces the photo back to full-bleed, edge-to-edge screen cover */
                background-position: 62% center; /* Shifts the frame rightward so the globe and chair are beautifully centered on mobile screens */
            }
            .content {
                left: 50%;
                top: 84%; 
                max-width: 90%;
            }
            h1 {
                font-size: 2.4rem; /* Scaled down slightly to perfectly frame portrait screens */
            }
            p {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="content">
            <h1>London Globes</h1>
            <p>Our brand new website is coming soon.</p>
        </div>
    </div>

</body>
</html>
