<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Globes - Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #1a1a1a; /* Seamless dark backdrop if needed */
        }
        /* Full-screen background configuration for DESKTOP */
        .background-container {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('globe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            position: relative;
        }
        /* Positions text lower down and centered precisely right under the globe stand */
        .content {
            position: absolute;
            top: 84%;   
            left: 46.5%; 
            transform: translate(-50%, -50%);
            color: #ffffff;
            padding: 10px;
            width: 85%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 6px 0;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }
        p {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 400;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
            opacity: 0.95;
        }
        
        /* 📱 MOBILE FIX: Applies ONLY to screens smaller than a tablet */
        @media (max-width: 768px) {
            .background-container {
                /* "contain" forces the phone to show 100% of the image widthwise */
                background-size: contain;
                background-position: center 30%; /* Moves image up slightly to leave space for text */
            }
            .content {
                left: 50%;
                top: 80%; /* Moves text into position below the fitted mobile image */
                max-width: 100%;
            }
            h1 {
                font-size: 2.2rem; /* Scales text down slightly so it looks proportional on mobile */
            }
            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="content">
            <h1>London Globes</h1>
            <p>Our brand new website is coming soon.</p>
        </div>
    </div>

</body>
</html>
