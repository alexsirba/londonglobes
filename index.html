<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Globes - Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #151515;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* 💻 PERFECT DESKTOP VIEW */
        .background-container {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('globe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            position: relative;
            display: block;
        }
        /* Desktop text placement precisely aligned under the globe */
        .content {
            position: absolute;
            top: 84%;   
            left: 46.5%; 
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 6px 0;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }
        p {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 400;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
            opacity: 0.95;
        }
        
        /* 📱 MOBILE OPTIMIZATION: Seamless Full-Screen Split Layout */
        @media (max-width: 768px) {
            body, html {
                overflow-y: auto; /* Allows smooth scrolling if text ever overflows short screens */
                height: auto;
                min-height: 100%;
            }
            .background-container {
                display: flex;
                flex-direction: column;
                height: 100vh; /* Takes up exactly the full height of the mobile screen */
                background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), url('globe.png');
                background-size: contain; /* Displays 100% of the image widthwise */
                background-position: top center; /* Pins image to the top */
                background-color: #151515; /* Merges into the matching background color below */
            }
            .content {
                position: relative;
                top: auto;
                left: auto;
                transform: none;
                margin-top: auto; /* Pushes text section down right below the image frame */
                padding: 40px 20px;
                width: 100%;
                max-width: 100%;
                background-color: #151515; /* Completely seamless solid dark base */
            }
            h1 {
                font-size: 2.5rem;
                text-shadow: none;
            }
            p {
                font-size: 1.2rem;
                text-shadow: none;
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="content">
            <h1>London Globes</h1>
            <p>Our brand new website is coming soon.</p>
        </div>
    </div>

</body>
</html>
