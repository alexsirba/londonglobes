<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Globes - Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        /* Full-screen background image configuration */
        .background-container {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('globe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            position: relative;
        }
        /* Positions text lower down and centered precisely under the globe alignment */
        .content {
            position: absolute;
            top: 83%;   /* Keeps it at your preferred lower position */
            left: 40%;  /* Nudges it slightly more to the left to match the center of the globe */
            transform: translate(-50%, -50%);
            color: #ffffff;
            padding: 10px;
            width: 85%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 6px 0;
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
        }
        p {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 400;
            text-shadow: 0 2px 6px rgba(0,0,0,0.7);
            opacity: 0.95;
        }
        
        /* Smooth reset for mobile phones so the text doesn't fall off the screen edge */
        @media (max-width: 768px) {
            .content {
                left: 50%;
                top: 82%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="content">
            <h1>London Globes</h1>
            <p>Our brand new website is coming soon.</p>
        </div>
    </div>

</body>
</html>
